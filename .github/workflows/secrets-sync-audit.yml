name: Secrets Sync Audit

permissions:
  contents: read
  actions: write

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 1'

jobs:
  sync-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: 20

      - name: Validate secret sync (GitHub vs Vercel)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/ops/audit-secrets-sync.cjs \
            --json-out artifacts/ops/secrets-sync-status.json

      - name: Upload sync report
        if: ${{ always() }}
        uses: actions/upload-artifact@b4ba15c8b5d20b9f2f264b1b1ed5d6d2c2e9b6e2
        with:
          name: secrets-sync-status
          path: artifacts/ops/secrets-sync-status.json
          if-no-files-found: ignore

