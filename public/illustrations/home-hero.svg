<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Conexăo e agendamento online</title>
  <desc id="desc">Ilustraçăo abstrata com formas suaves e um painel de agenda, representando conexăo, horários e atendimento online.</desc>
  <defs>
    <linearGradient id="g1" x1="174" y1="120" x2="1050" y2="822" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC" stop-opacity="1"/>
      <stop offset="0.45" stop-color="#EEF2FF" stop-opacity="1"/>
      <stop offset="1" stop-color="#ECFDF5" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="brand" x1="240" y1="240" x2="820" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22C55E" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#3B82F6" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#10B981" stop-opacity="0.14"/>
    </linearGradient>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%" filterUnits="objectBoundingBox">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Background field -->
  <rect x="60" y="70" width="1080" height="760" rx="40" fill="url(#g1)"/>

  <!-- Soft blobs -->
  <ellipse cx="300" cy="240" rx="210" ry="170" fill="url(#brand)" filter="url(#blur)"/>
  <ellipse cx="920" cy="650" rx="240" ry="190" fill="#A7F3D0" fill-opacity="0.25" filter="url(#blur)"/>
  <ellipse cx="980" cy="240" rx="190" ry="160" fill="#BFDBFE" fill-opacity="0.22" filter="url(#blur)"/>

  <!-- Main card -->
  <g filter="url(#shadow)">
    <rect x="210" y="185" width="780" height="530" rx="28" fill="#FFFFFF" fill-opacity="0.88"/>
    <rect x="210" y="185" width="780" height="530" rx="28" stroke="#E5E7EB" stroke-opacity="0.9"/>
  </g>

  <!-- Header row -->
  <rect x="250" y="225" width="210" height="34" rx="17" fill="#F1F5F9"/>
  <circle cx="270" cy="242" r="6" fill="#22C55E"/>
  <rect x="285" y="236" width="150" height="12" rx="6" fill="#CBD5E1"/>

  <rect x="780" y="225" width="170" height="34" rx="17" fill="#F8FAFC"/>
  <rect x="800" y="236" width="130" height="12" rx="6" fill="#CBD5E1"/>

  <!-- Two columns: profile + schedule -->
  <!-- Profile -->
  <g>
    <rect x="250" y="286" width="360" height="390" rx="22" fill="#F8FAFC" stroke="#E5E7EB"/>
    <circle cx="310" cy="348" r="34" fill="#22C55E" fill-opacity="0.18"/>
    <circle cx="310" cy="348" r="18" fill="#22C55E" fill-opacity="0.28"/>

    <rect x="360" y="324" width="210" height="14" rx="7" fill="#0F172A" fill-opacity="0.10"/>
    <rect x="360" y="348" width="170" height="12" rx="6" fill="#0F172A" fill-opacity="0.08"/>

    <rect x="280" y="400" width="300" height="10" rx="5" fill="#0F172A" fill-opacity="0.07"/>
    <rect x="280" y="420" width="260" height="10" rx="5" fill="#0F172A" fill-opacity="0.06"/>
    <rect x="280" y="440" width="210" height="10" rx="5" fill="#0F172A" fill-opacity="0.05"/>

    <rect x="280" y="490" width="130" height="28" rx="14" fill="#ECFDF5" stroke="#A7F3D0"/>
    <rect x="295" y="500" width="96" height="10" rx="5" fill="#065F46" fill-opacity="0.35"/>

    <rect x="420" y="490" width="130" height="28" rx="14" fill="#EEF2FF" stroke="#C7D2FE"/>
    <rect x="435" y="500" width="96" height="10" rx="5" fill="#3730A3" fill-opacity="0.28"/>

    <rect x="280" y="540" width="300" height="96" rx="18" fill="#FFFFFF" stroke="#E5E7EB"/>
    <rect x="300" y="560" width="260" height="10" rx="5" fill="#0F172A" fill-opacity="0.06"/>
    <rect x="300" y="580" width="230" height="10" rx="5" fill="#0F172A" fill-opacity="0.05"/>
    <rect x="300" y="600" width="190" height="10" rx="5" fill="#0F172A" fill-opacity="0.04"/>
  </g>

  <!-- Schedule -->
  <g>
    <rect x="640" y="286" width="310" height="390" rx="22" fill="#FFFFFF" stroke="#E5E7EB"/>
    <rect x="670" y="316" width="160" height="12" rx="6" fill="#0F172A" fill-opacity="0.10"/>
    <rect x="670" y="338" width="120" height="10" rx="5" fill="#0F172A" fill-opacity="0.06"/>

    <!-- Calendar grid -->
    <rect x="670" y="372" width="250" height="240" rx="18" fill="#F8FAFC" stroke="#E5E7EB"/>
    <g opacity="0.9">
      <rect x="690" y="395" width="60" height="42" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>
      <rect x="760" y="395" width="60" height="42" rx="12" fill="#ECFDF5" stroke="#A7F3D0"/>
      <rect x="830" y="395" width="60" height="42" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>

      <rect x="690" y="446" width="60" height="42" rx="12" fill="#EEF2FF" stroke="#C7D2FE"/>
      <rect x="760" y="446" width="60" height="42" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>
      <rect x="830" y="446" width="60" height="42" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>

      <rect x="690" y="497" width="60" height="42" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>
      <rect x="760" y="497" width="60" height="42" rx="12" fill="#ECFDF5" stroke="#A7F3D0"/>
      <rect x="830" y="497" width="60" height="42" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>

      <rect x="690" y="548" width="60" height="42" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>
      <rect x="760" y="548" width="60" height="42" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>
      <rect x="830" y="548" width="60" height="42" rx="12" fill="#EEF2FF" stroke="#C7D2FE"/>
    </g>

    <!-- CTA button -->
    <rect x="670" y="628" width="250" height="42" rx="21" fill="#22C55E" fill-opacity="0.92"/>
    <rect x="740" y="643" width="110" height="12" rx="6" fill="#FFFFFF" fill-opacity="0.9"/>
  </g>

  <!-- Connection lines -->
  <path d="M610 390C650 360 660 350 700 350" stroke="#22C55E" stroke-opacity="0.35" stroke-width="3" stroke-linecap="round"/>
  <path d="M610 520C650 540 670 550 700 560" stroke="#3B82F6" stroke-opacity="0.22" stroke-width="3" stroke-linecap="round"/>
  <circle cx="610" cy="390" r="6" fill="#22C55E" fill-opacity="0.45"/>
  <circle cx="700" cy="350" r="6" fill="#22C55E" fill-opacity="0.45"/>
  <circle cx="610" cy="520" r="6" fill="#3B82F6" fill-opacity="0.30"/>
  <circle cx="700" cy="560" r="6" fill="#3B82F6" fill-opacity="0.30"/>
</svg>
