name: Secrets Sync Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 1'

jobs:
  sync-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate secret sync (GitHub vs Vercel)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/ops/audit-secrets-sync.cjs \
            --json-out artifacts/ops/secrets-sync-status.json

      - name: Upload sync report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: secrets-sync-status
          path: artifacts/ops/secrets-sync-status.json
          if-no-files-found: ignore
