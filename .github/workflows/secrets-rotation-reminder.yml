name: Secrets Rotation Reminder

permissions:
  contents: read
  actions: write

on:
  workflow_dispatch:
  schedule:
    - cron: '30 8 * * *'

jobs:
  rotation-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: 20

      - name: Check rotation register (warn + fail on due/overdue)
        run: |
          node scripts/ops/check-secrets-rotation.cjs \
            --warn-window-days 14 \
            --fail-on due_soon,overdue \
            --json-out artifacts/ops/secrets-rotation-status.json

      - name: Upload rotation report
        if: ${{ always() }}
        uses: actions/upload-artifact@b4ba15c8b5d20b9f2f264b1b1ed5d6d2c2e9b6e2
        with:
          name: secrets-rotation-status
          path: artifacts/ops/secrets-rotation-status.json
          if-no-files-found: ignore

