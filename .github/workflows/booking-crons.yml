name: Booking Cron Jobs

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: booking-crons
  cancel-in-progress: false

jobs:
  run-crons:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Prepare time window
        id: clock
        run: |
          minute="$(date -u +'%M')"
          minute_num=$((10#$minute))
          if (( minute_num % 15 == 0 )); then
            echo "run_timeouts=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_timeouts=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run booking reminders (every 5 min)
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET is missing in repository secrets."
            exit 1
          fi
          SECRET="$(printf "%s" "$CRON_SECRET" | tr -d '\r\n' | sed 's/^"//;s/"$//')"
          echo "CRON_SECRET_LENGTH=${#SECRET}"
          http_code=$(curl --silent --show-error --output response.json --write-out "%{http_code}" \
            -H "x-cron-secret: $SECRET" \
            "https://muuday-app.vercel.app/api/cron/booking-reminders")
          echo "booking-reminders status: $http_code"
          cat response.json
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            exit 22
          fi

      - name: Run booking timeouts (every 15 min)
        if: steps.clock.outputs.run_timeouts == 'true'
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          SECRET="$(printf "%s" "$CRON_SECRET" | tr -d '\r\n' | sed 's/^"//;s/"$//')"
          echo "CRON_SECRET_LENGTH=${#SECRET}"
          http_code=$(curl --silent --show-error --output response.json --write-out "%{http_code}" \
            -H "x-cron-secret: $SECRET" \
            "https://muuday-app.vercel.app/api/cron/booking-timeouts")
          echo "booking-timeouts status: $http_code"
          cat response.json
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            exit 22
          fi
