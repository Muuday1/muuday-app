name: Secrets Sync Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 1'

jobs:
  resolve-sync-audit-secrets:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    env:
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Resolve secrets sync audit gate
        id: gate
        run: |
          missing=()
          if [ -z "${VERCEL_PROJECT_ID}" ]; then
            missing+=("VERCEL_PROJECT_ID (repo variable)")
          fi
          if [ -z "${VERCEL_TOKEN}" ]; then
            missing+=("VERCEL_TOKEN (repo secret)")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Secrets Sync Audit skipped. Missing: ${missing[*]}"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Required Vercel credentials found. Running Secrets Sync Audit."
          fi

  sync-audit:
    runs-on: ubuntu-latest
    needs: resolve-sync-audit-secrets
    if: ${{ needs.resolve-sync-audit-secrets.outputs.should_run == 'true' }}
    timeout-minutes: 10
    env:
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Validate secret sync (GitHub vs Vercel)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/ops/audit-secrets-sync.cjs \
            --json-out artifacts/ops/secrets-sync-status.json

      - name: Upload sync report
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: secrets-sync-status
          path: artifacts/ops/secrets-sync-status.json
          if-no-files-found: ignore
