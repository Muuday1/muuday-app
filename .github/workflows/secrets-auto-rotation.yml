name: Secrets Auto-Rotation

permissions:
  contents: write
  actions: write
  issues: write

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no changes)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      only:
        description: 'Limit to specific providers or secret names (comma-separated, optional)'
        required: false
        default: ''
        type: string
  schedule:
    # 1st of every month at 06:00 UTC
    - cron: '0 6 1 * *'

jobs:
  auto-rotate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      # Provider credentials stored in GitHub Secrets
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_ADMIN_KEY: ${{ secrets.OPENAI_ADMIN_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      UPSTASH_EMAIL: ${{ secrets.UPSTASH_EMAIL }}
      UPSTASH_API_KEY: ${{ secrets.UPSTASH_API_KEY }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: 20

      - name: Run auto-rotation
        id: rotate
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ github.event.inputs.only }}" ]; then
            ARGS="$ARGS --only ${{ github.event.inputs.only }}"
          fi

          node scripts/ops/rotate-secrets.cjs \
            $ARGS \
            --json-out artifacts/ops/secrets-auto-rotation-report.json

      - name: Upload rotation report
        if: ${{ always() }}
        uses: actions/upload-artifact@b4ba15c8b5d20b9f2f264b1b1ed5d6d2c2e9b6e2
        with:
          name: secrets-auto-rotation-report
          path: artifacts/ops/secrets-auto-rotation-report.json
          if-no-files-found: ignore

      - name: Commit register updates (non-dry-run)
        if: ${{ github.event.inputs.dry_run != 'true' && success() }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/engineering/runbooks/secrets-rotation-register.json
          if git diff --cached --quiet; then
            echo "No register changes to commit."
          else
            git commit -m "chore(ops): auto-rotate overdue secrets [$(date -u +%Y-%m-%d)]"
            git push
          fi

      - name: Create issue for manual actions
        if: ${{ always() && steps.rotate.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT="artifacts/ops/secrets-auto-rotation-report.json"
          if [ ! -f "$REPORT" ]; then
            echo "No report found."
            exit 0
          fi

          MANUAL_COUNT=$(jq '.summary.manual // 0' "$REPORT")
          if [ "$MANUAL_COUNT" -eq 0 ]; then
            echo "No manual actions required."
            exit 0
          fi

          BODY="$(jq -r '
            "## Secrets Auto-Rotation Report — Manual Actions Required\n\n",
            ("Run at: " + .run_at_utc + "\n\n"),
            ("### Summary\n"),
            ("- Auto-rotated: " + (.summary.auto_rotated | tostring) + "\n"),
            ("- Failed: " + (.summary.failed | tostring) + "\n"),
            ("- Skipped: " + (.summary.skipped | tostring) + "\n"),
            ("- Manual: " + (.summary.manual | tostring) + "\n\n"),
            "### Manual Actions\n",
            (.manual_actions[] | "- **\(.secret)**: \(.note)\n")
          ' "$REPORT")"

          gh issue create \
            --title "[ops] Manual secret rotation required ($(date -u +%Y-%m-%d))" \
            --body "$BODY" \
            --label "ops,security" \
            --repo "$GITHUB_REPOSITORY"
