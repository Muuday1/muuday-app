name: Checkly Validate

on:
  push:
    branches: [main]
    paths:
      - "checkly.config.js"
      - "checkly/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/checkly-validate.yml"
  pull_request:
    branches: [main]
    paths:
      - "checkly.config.js"
      - "checkly/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/checkly-validate.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  validate-checkly-project:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Parse and validate Checkly project
        run: npm run checkly:validate

  resolve-checkly-secrets:
    runs-on: ubuntu-latest
    needs: validate-checkly-project
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    env:
      CHECKLY_API_KEY: ${{ secrets.CHECKLY_API_KEY }}
      CHECKLY_ACCOUNT_ID: ${{ secrets.CHECKLY_ACCOUNT_ID }}
    steps:
      - name: Resolve Checkly execution gate
        id: gate
        run: |
          if [ -n "${CHECKLY_API_KEY}" ] && [ -n "${CHECKLY_ACCOUNT_ID}" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Checkly credentials found. Synthetic tests enabled."
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CHECKLY_API_KEY/CHECKLY_ACCOUNT_ID missing. Synthetic tests and deploy will be skipped."
          fi

  checkly-synthetic-tests:
    runs-on: ubuntu-latest
    needs: [validate-checkly-project, resolve-checkly-secrets]
    if: ${{ needs.resolve-checkly-secrets.outputs.should_run == 'true' }}
    env:
      CHECKLY_API_KEY: ${{ secrets.CHECKLY_API_KEY }}
      CHECKLY_ACCOUNT_ID: ${{ secrets.CHECKLY_ACCOUNT_ID }}
      CHECKLY_BASE_URL: ${{ vars.CHECKLY_BASE_URL || 'https://muuday-app.vercel.app' }}
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
      E2E_PROFESSIONAL_EMAIL: ${{ secrets.E2E_PROFESSIONAL_EMAIL }}
      E2E_PROFESSIONAL_PASSWORD: ${{ secrets.E2E_PROFESSIONAL_PASSWORD }}
      E2E_PROFESSIONAL_ID: ${{ secrets.E2E_PROFESSIONAL_ID }}
      E2E_MANUAL_PROFESSIONAL_ID: ${{ secrets.E2E_MANUAL_PROFESSIONAL_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Checkly synthetic tests
        run: npm run checkly:test

  checkly-deploy:
    runs-on: ubuntu-latest
    needs: [checkly-synthetic-tests, resolve-checkly-secrets]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.resolve-checkly-secrets.outputs.should_run == 'true' }}
    env:
      CHECKLY_API_KEY: ${{ secrets.CHECKLY_API_KEY }}
      CHECKLY_ACCOUNT_ID: ${{ secrets.CHECKLY_ACCOUNT_ID }}
      CHECKLY_BASE_URL: ${{ vars.CHECKLY_BASE_URL || 'https://muuday-app.vercel.app' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy Checkly checks
        run: npm run checkly:deploy
