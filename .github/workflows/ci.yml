name: CI

permissions:
  contents: read
  actions: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      E2E_BASE_URL: ${{ vars.E2E_BASE_URL || 'https://muuday-app.vercel.app' }}
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      E2E_PROFESSIONAL_EMAIL: ${{ secrets.E2E_PROFESSIONAL_EMAIL }}
      E2E_PROFESSIONAL_PASSWORD: ${{ secrets.E2E_PROFESSIONAL_PASSWORD }}
      E2E_PROFESSIONAL_ID: ${{ secrets.E2E_PROFESSIONAL_ID }}
      E2E_MANUAL_PROFESSIONAL_ID: ${{ secrets.E2E_MANUAL_PROFESSIONAL_ID }}
      E2E_BLOCKED_PROFESSIONAL_ID: ${{ secrets.E2E_BLOCKED_PROFESSIONAL_ID }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL || '' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || '' }}
      SUPABASE_DB_POOLER_URL: ${{ secrets.SUPABASE_DB_POOLER_URL || vars.SUPABASE_DB_POOLER_URL || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      - name: Verify no tracked env files
        run: |
          tracked=$(git ls-files | grep -E '^\.env' || true)
          if [ -n "$tracked" ]; then
            echo "Tracked env files detected:"
            echo "$tracked"
            exit 1
          fi
          echo "No tracked env files found."

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies for high+ severity CVEs
        run: npm audit --audit-level=high

      - name: Validate required E2E secrets on main
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: |
          missing=0
          required_vars=(
            E2E_USER_EMAIL
            E2E_USER_PASSWORD
            E2E_PROFESSIONAL_EMAIL
            E2E_PROFESSIONAL_PASSWORD
            NEXT_PUBLIC_SUPABASE_URL
            SUPABASE_SERVICE_ROLE_KEY
            SUPABASE_DB_POOLER_URL
          )
          for key in "${required_vars[@]}"; do
            if [ -z "${!key}" ]; then
              echo "Missing required CI secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "E2E credential/fixture secrets are missing for main push."
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Encoding check
        run: npm run check:encoding

      - name: Unit tests
        run: npm run test:unit

      - name: Cache Next.js build
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Build
        run: npm run build

      - name: Validate DB pooling in production mode
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        env:
          REQUIRE_DB_POOLER: 'true'
          VERCEL_ENV: production
        run: npm run db:validate-pooling

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Auto-heal E2E professional fixtures
        id: auto_heal_fixtures
        if: ${{ env.NEXT_PUBLIC_SUPABASE_URL != '' && env.SUPABASE_SERVICE_ROLE_KEY != '' }}
        run: npm run fixtures:ensure-public-ready

      - name: End-to-end tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ always() }}
        uses: actions/upload-artifact@b4ba15c8b5d20b9f2f264b1b1ed5d6d2c2e9b6e2
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
